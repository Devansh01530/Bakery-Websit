<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Bakes - Cart</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="index.html">🎂 Fresh Bakes</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">🛒 Cart <span class="cart-badge" id="cartCount">0</span></a></li>
    </ul>
  </nav>

  <div class="page-top">
    <h1>🛒 Your Cart</h1>
  </div>

  <div class="cart-section">
    <div id="cartContent"></div>
  </div>

  <footer>
    <p>© 2025 Fresh Bakes | 12 MG Road, Ghaziabad | +91-9876543210</p>
  </footer>

  <div class="toast" id="toast"></div>

  <!-- CHATBOT (shared) -->
  <script src="chatbot.js"></script>

  <script>
    /* ======= CART FUNCTIONS ======= */
    function getCart()       { return JSON.parse(localStorage.getItem("freshBakesCart")) || []; }
    function saveCart(cart)  { localStorage.setItem("freshBakesCart", JSON.stringify(cart)); updateBadge(); }
    function getTotal()      { return getCart().reduce((s,i) => s + i.price * i.qty, 0); }
    function updateBadge()   { const el = document.getElementById("cartCount"); if(el) el.textContent = getCart().reduce((s,i)=>s+i.qty,0); }
    function showToast(msg)  { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2500); }

    function removeItem(id) {
      saveCart(getCart().filter(c => c.id !== id));
      renderCart();
    }
    function changeQty(id, delta) {
      let cart = getCart();
      const item = cart.find(c => c.id === id);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
      }
      saveCart(cart);
      renderCart();
    }

    /* ======= RENDER CART ======= */
    function renderCart() {
      const cart    = getCart();
      const content = document.getElementById("cartContent");

      if (cart.length === 0) {
        content.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🛒</div>
            <h2>Your cart is empty!</h2>
            <p>You have not added anything yet.</p>
            <a href="product.html" class="btn">Browse Products</a>
          </div>`;
        return;
      }

      const subtotal = getTotal();
      const delivery = subtotal >= 599 ? 0 : 49;
      const total    = subtotal + delivery;

      const itemsHTML = cart.map(item => `
        <div class="cart-item">
          <div class="item-emoji">${item.emoji || "🎂"}</div>
          <div class="item-info">
            <h3>${item.name}</h3>
            <div class="item-price">₹${item.price} each</div>
            <div class="qty-row">
              <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty('${item.id}', +1)">+</button>
            </div>
          </div>
          <div class="item-total">₹${item.price * item.qty}</div>
          <button class="remove-btn" onclick="removeItem('${item.id}')">🗑</button>
        </div>`).join("");

      content.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">${itemsHTML}</div>
          <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
            <div class="summary-row"><span>Delivery</span><span>${delivery === 0 ? "FREE" : "₹" + delivery}</span></div>
            <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
            <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
            <a href="product.html" class="continue-link">← Continue Shopping</a>
          </div>
        </div>`;
    }

    updateBadge();
    renderCart();
  </script>

</body>
</html>
