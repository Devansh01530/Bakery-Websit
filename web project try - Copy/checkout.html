<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Bakes - Checkout</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="logo" href="index.html">🎂 Fresh Bakes</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">🛒 Cart <span class="cart-badge" id="cartCount">0</span></a></li>
    </ul>
  </nav>

  <div class="page-top">
    <h1>🧾 Checkout</h1>
  </div>

  <div class="checkout-section">
    <div class="checkout-layout">

      <!-- FORM -->
      <div>
        <div class="form-card">
          <h2>📦 Delivery Details</h2>
          <div class="form-row">
            <div class="form-group"><label>First Name *</label><input type="text" id="firstName" placeholder="Rahul"/></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Sharma"/></div>
          </div>
          <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" placeholder="+91 9876543210"/></div>
          <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="rahul@email.com"/></div>
          <div class="form-group"><label>Delivery Address *</label><textarea id="address" rows="3" placeholder="Flat No, Street, Colony..."></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>City</label><input type="text" id="city" placeholder="Ghaziabad"/></div>
            <div class="form-group"><label>PIN Code</label><input type="text" id="pin" placeholder="201001"/></div>
          </div>
        </div>

        <div class="form-card" style="margin-top: 20px;">
          <h2>💳 Payment Method</h2>
          <div class="payment-options">
            <div class="pay-opt selected" onclick="selectPay(this,'cod')"><div class="pay-icon">💵</div>Cash</div>
            <div class="pay-opt" onclick="selectPay(this,'upi')"><div class="pay-icon">📱</div>UPI</div>
            <div class="pay-opt" onclick="selectPay(this,'card')"><div class="pay-icon">💳</div>Card</div>
          </div>
          <div class="pay-note" id="payNote">💵 Pay cash when your order arrives.</div>
        </div>
      </div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary">
        <h2>Your Order</h2>
        <div id="summaryItems"></div>
        <hr style="margin: 10px 0; border-color: #eee;"/>
        <div class="summary-row"><span>Subtotal</span><span id="subtotalVal">₹0</span></div>
        <div class="summary-row"><span>Delivery</span><span id="deliveryVal">₹49</span></div>
        <div class="summary-row total"><span>Total</span><span id="totalVal">₹0</span></div>
        <button class="place-btn" onclick="placeOrder()">✅ Place Order</button>
      </div>

    </div>
  </div>

  <footer>
    <p>© 2025 Fresh Bakes | 12 MG Road, Ghaziabad | +91-9876543210</p>
  </footer>

  <div class="toast" id="toast"></div>

  <!-- CHATBOT (shared) -->
  <script src="chatbot.js"></script>

  <script>
    /* ======= CART ======= */
    function getCart()      { return JSON.parse(localStorage.getItem("freshBakesCart")) || []; }
    function getTotal()     { return getCart().reduce((s,i) => s + i.price * i.qty, 0); }
    function updateBadge()  { const el=document.getElementById("cartCount"); if(el) el.textContent=getCart().reduce((s,i)=>s+i.qty,0); }
    function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2500); }

    let selectedPayment = "cod";
    const payNotes = {
      cod:  "💵 Pay cash when your order arrives.",
      upi:  "📱 UPI payment link will be sent after confirmation.",
      card: "💳 Card payment collected at delivery."
    };
    function selectPay(el, method) {
      document.querySelectorAll(".pay-opt").forEach(o => o.classList.remove("selected"));
      el.classList.add("selected");
      selectedPayment = method;
      document.getElementById("payNote").textContent = payNotes[method];
    }

    /* ======= RENDER SUMMARY ======= */
    function renderSummary() {
      const cart = getCart();
      if (cart.length === 0) { window.location.href = "cart.html"; return; }
      const subtotal = getTotal();
      const delivery = subtotal >= 599 ? 0 : 49;
      const total    = subtotal + delivery;
      document.getElementById("summaryItems").innerHTML = cart.map(i =>
        `<div class="summary-row"><span>${i.name} x${i.qty}</span><span>₹${i.price * i.qty}</span></div>`
      ).join("");
      document.getElementById("subtotalVal").textContent = "₹" + subtotal;
      document.getElementById("deliveryVal").textContent = delivery === 0 ? "FREE" : "₹" + delivery;
      document.getElementById("totalVal").textContent    = "₹" + total;
    }

    /* ======= PLACE ORDER ======= */
    function placeOrder() {
      const firstName = document.getElementById("firstName").value.trim();
      const phone     = document.getElementById("phone").value.trim();
      const address   = document.getElementById("address").value.trim();
      if (!firstName || !phone || !address) {
        showToast("Please fill in all required fields!");
        return;
      }
      const order = {
        id:       "FB" + Date.now(),
        customer: firstName + " " + document.getElementById("lastName").value,
        phone, address,
        city:     document.getElementById("city").value,
        payment:  selectedPayment,
        items:    getCart(),
        total:    getTotal() + (getTotal() >= 599 ? 0 : 49),
        date:     new Date().toLocaleString()
      };
      localStorage.setItem("freshBakesOrder", JSON.stringify(order));
      localStorage.removeItem("freshBakesCart");
      window.location.href = "success.html";
    }

    updateBadge();
    renderSummary();
  </script>

</body>
</html>
